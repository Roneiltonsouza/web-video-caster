<script>
    let currentFacingMode = "environment"; // Inicia com a traseira

    // Botão Mágico atualizado para alternar câmera
    function toggleCamera() {
        // Alterna o estado
        currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
        
        // Se já estiver transmitindo, precisamos reiniciar o stream com a nova câmera
        if (localStream) {
            // Para o stream atual
            localStream.getTracks().forEach(track => track.stop());
            
            // Re-inicia com o novo facingMode
            restartStream();
        } else {
            alert("Modo alternado para: " + (currentFacingMode === "environment" ? "Traseira" : "Frontal"));
        }
    }

    async function restartStream() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: { exact: currentFacingMode } }, 
                audio: true 
            });
            displayStream(localStream);
            // Se houver uma chamada ativa (call), deve-se substituir a trilha (track)
            if (window.activeCall) {
                const videoTrack = localStream.getVideoTracks()[0];
                const sender = window.activeCall.peerConnection.getSenders().find(s => s.track.kind === "video");
                sender.replaceTrack(videoTrack);
            }
        } catch (err) {
            // Fallback caso a câmera frontal/traseira não exista
            alert("Erro ao trocar câmera: " + err.message);
        }
    }
</script>

<div class="footer-action">
    <div class="btn-row">
        <button class="btn-magic" onclick="toggleCamera()">🔄 Inverter Câmera</button>
        <button class="btn-transmit" onclick="startMirroring(true)">Transmitir</button>
    </div>
</div>
