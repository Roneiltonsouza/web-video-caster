<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Mirror Pro - Atualizado 2026</title>
    <style>
        /* Estilos mantidos conforme sua interface original */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #ffffff; min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .main-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 24px; }
        .panel { background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(71, 85, 105, 0.5); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        .id-box { background: rgba(15, 23, 42, 0.8); border: 1px solid #3b82f6; padding: 12px; border-radius: 8px; color: #60a5fa; text-align: center; cursor: pointer; }
        .btn-primary { background: #3b82f6; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; }
        .logs { background: #0f172a; height: 150px; overflow-y: auto; padding: 10px; font-size: 0.8rem; border-radius: 8px; }
        .video-section { background: #000; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; border-radius: 12px; }
        @media (max-width: 1024px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Screen Mirror Pro v2.0</h1>
        <div class="main-grid">
            <div class="sidebar">
                <div class="panel">
                    <h2>🔑 ID de Conexão</h2>
                    <div class="id-box" id="myIdBox">Gerando...</div>
                </div>
                <div class="panel">
                    <input type="text" id="remoteIdInput" placeholder="ID do parceiro...">
                    <button class="btn-primary" onclick="startSharing('screen')">🖥️ Compartilhar Tela</button>
                    <button class="btn-primary" style="background:#a855f7" onclick="stopSharing()">⏹️ Parar</button>
                </div>
                <div class="panel">
                    <h2>📋 Logs</h2>
                    <div class="logs" id="logsContainer"></div>
                </div>
            </div>
            <div class="video-section" id="videoSection">
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script>
        let peer, currentCall, localStream;
        const logsContainer = document.getElementById('logsContainer');

        function addLog(msg, type = 'info') {
            const time = new Date().toLocaleTimeString();
            logsContainer.innerHTML += `<div class="log-entry ${type}">[${time}] ${msg}</div>`;
            logsContainer.scrollTop = logsContainer.scrollHeight;
        }

        // --- FUNÇÕES DE ATUALIZAÇÃO ---
        function initPeer() {
            peer = new Peer();
            peer.on('open', (id) => {
                document.getElementById('myIdBox').textContent = id;
                addLog('✅ Sistema pronto. ID: ' + id, 'success');
            });

            // Reconexão automática
            peer.on('error', (err) => {
                addLog('⚠️ Erro: ' + err.type + '. Tentando reconectar...', 'error');
                setTimeout(initPeer, 5000);
            });
        }

        async function startSharing(type) {
            try {
                // Ajuste Dinâmico de Resolução
                const constraints = {
                    video: { width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 24 } },
                    audio: true
                };
                
                localStream = type === 'screen' 
                    ? await navigator.mediaDevices.getDisplayMedia(constraints)
                    : await navigator.mediaDevices.getUserMedia({ video: true, audio: true });

                const peerId = document.getElementById('remoteIdInput').value;
                currentCall = peer.call(peerId, localStream);
                addLog('🚀 Transmissão iniciada com qualidade otimizada');
            } catch (err) {
                addLog('❌ Falha ao iniciar: ' + err.message, 'error');
            }
        }

        function stopSharing() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                addLog('⏹️ Transmissão encerrada');
            }
        }

        // Heartbeat para manter conexão
        setInterval(() => {
            if (peer && peer.disconnected) {
                peer.reconnect();
                addLog('🔄 Conexão restabelecida');
            }
        }, 10000);

        initPeer();
    </script>
</body>
</html>
