<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Video Caster - Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2563eb;
            --secondary: #7c3aed;
            --background: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--background); color: var(--text); padding-bottom: 120px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 1rem; }

        header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 1rem 0; position: sticky; top: 0; z-index: 100; }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary); }

        /* Barra de Ação Fixa no Rodapé */
        .footer-action {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--card); padding: 1rem; border-top: 2px solid var(--border);
            display: flex; gap: 10px; justify-content: center; z-index: 1000;
        }

        .btn-primary { background: var(--primary); color: white; border: none; padding: 1rem 2rem; border-radius: 0.5rem; font-weight: bold; cursor: pointer; }
        
        .section { margin: 2rem 0; }
        .id-display { font-weight: bold; color: var(--secondary); background: #eee; padding: 5px; border-radius: 4px; }
        .screen-preview { width: 100%; height: 300px; background: #000; border-radius: 1rem; display: flex; align-items: center; justify-content: center; color: white; margin-top: 1rem; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">📺 Web Video Caster</div>
                <div id="my-id-display">Seu ID: <span class="id-display" id="my-id">Carregando...</span></div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="section">
            <h2 id="status-text">Status: Iniciando...</h2>
            <div class="screen-preview" id="preview-area">
                <div id="placeholder">Aguardando conexão...</div>
            </div>
        </div>
    </main>

    <div class="footer-action">
        <input type="text" id="remote-id" placeholder="ID do destinatário" style="padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        <button class="btn-primary" onclick="startCellMirroring()">Conectar e Transmitir</button>
    </div>

    <script>
        let peer;
        let localStream;

        // Inicialização com ID Persistente
        function initPeer() {
            let myId = localStorage.getItem('device_peer_id');
            
            // Se não tiver um ID, gera um único baseado em tempo/aleatório
            if (!myId) {
                myId = 'vc_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('device_peer_id', myId);
            }

            document.getElementById('my-id').innerText = myId;
            peer = new Peer(myId);

            peer.on('open', (id) => {
                document.getElementById('status-text').innerText = "Status: Online (ID: " + id + ")";
            });

            peer.on('call', (call) => {
                call.answer();
                call.on('stream', (remoteStream) => {
                    displayStream(remoteStream);
                });
            });
        }

        async function startCellMirroring() {
            const remoteId = document.getElementById('remote-id').value;
            if (!remoteId) return alert("Insira o ID de destino.");

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
                displayStream(localStream);
                
                const call = peer.call(remoteId, localStream);
                document.getElementById('status-text').innerText = "Status: Transmitindo para " + remoteId;
            } catch (err) {
                alert("Erro ao acessar câmera: " + err.message);
            }
        }

        function displayStream(stream) {
            const area = document.getElementById('preview-area');
            area.innerHTML = '';
            const video = document.createElement('video');
            video.srcObject = stream;
            video.autoplay = true;
            video.playsInline = true;
            area.appendChild(video);
        }

        // Inicia o Peer ao carregar a página
        window.onload = initPeer;
    </script>
</body>
</html>
