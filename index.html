<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espelhamento de Tela - Celular para Celular</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #7c3aed;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --background: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #f1f5f9;
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 { 
            font-size: 1.5rem; 
            text-align: center; 
            margin-bottom: 1.5rem; 
            color: var(--primary); 
        }

        .section {
            margin-bottom: 1.5rem;
            padding: 1rem;
            border: 1px solid #eef2f6;
            border-radius: 0.75rem;
        }

        .id-box {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            border: 2px dashed var(--primary);
            margin: 10px 0;
            cursor: pointer;
            font-family: monospace;
            font-size: 1.1rem;
            color: var(--primary);
            transition: all 0.2s;
        }

        .id-box:hover {
            background: #eff6ff;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.1s, opacity 0.2s;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        button:active { 
            transform: scale(0.98); 
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-share { 
            background: var(--primary); 
            color: white; 
        }

        .btn-camera { 
            background: var(--secondary); 
            color: white; 
        }

        .btn-record {
            background: var(--danger);
            color: white;
        }

        .btn-record.recording {
            background: #991b1b;
            animation: pulse-record 1s infinite;
        }

        @keyframes pulse-record {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .btn-stop {
            background: #64748b;
            color: white;
        }

        .recording-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: var(--danger);
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse-dot 1s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .button-group-full {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #video-container {
            width: 100%;
            background: #000;
            border-radius: 12px;
            margin-top: 15px;
            overflow: hidden;
            display: none;
            aspect-ratio: 16/9;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .local-video-preview {
            width: 100%;
            background: #000;
            border-radius: 12px;
            margin-top: 15px;
            overflow: hidden;
            display: none;
            aspect-ratio: 16/9;
        }

        .status {
            font-size: 0.85rem;
            text-align: center;
            margin-top: 15px;
            font-weight: 500;
        }

        .status-online { 
            color: var(--success); 
        }

        .status-offline { 
            color: var(--danger); 
        }

        .status-transmitting {
            color: var(--warning);
        }

        #logs {
            font-size: 0.75rem;
            color: #64748b;
            max-height: 120px;
            overflow-y: auto;
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 10px;
            font-family: monospace;
        }

        .log-entry { 
            margin-bottom: 4px; 
            border-bottom: 1px solid #f8fafc; 
            padding-bottom: 2px; 
        }

        .recording-time {
            text-align: center;
            font-weight: bold;
            color: var(--danger);
            margin-top: 10px;
            font-size: 1.2rem;
        }

        .info-box {
            background: #eff6ff;
            border-left: 4px solid var(--primary);
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 0.85rem;
            color: #1e40af;
        }

        .info-box.warning {
            background: #fffbeb;
            border-left-color: var(--warning);
            color: #92400e;
        }

        .info-box.success {
            background: #f0fdf4;
            border-left-color: var(--success);
            color: #166534;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Screen Mirror Pro</h1>
        
        <div class="section">
            <strong>Seu ID de Conexão:</strong>
            <div id="my-id" class="id-box" onclick="copyId()">Carregando...</div>
            <p style="font-size: 0.75rem; color: #64748b; text-align: center;">Toque no ID acima para copiar.</p>
        </div>

        <div class="section">
            <strong>Conectar a outro dispositivo:</strong>
            <input type="text" id="remote-id" placeholder="Insira o ID do parceiro...">
            
            <div class="button-group">
                <button class="btn-share" onclick="startSharing('screen')">🖥️ Tela</button>
                <button class="btn-camera" onclick="startSharing('camera')">📷 Câmera</button>
            </div>

            <button class="btn-stop" onclick="stopSharing()" style="display: none;" id="stop-btn">
                ⏹️ Parar Transmissão
            </button>
        </div>

        <!-- Seção de Gravação (visível apenas durante transmissão de câmera) -->
        <div class="section" id="recording-section" style="display: none;">
            <strong>Gravação de Vídeo:</strong>
            <div class="info-box warning">
                ⚠️ A gravação será salva no seu dispositivo quando finalizada.
            </div>
            
            <button class="btn-record" id="record-btn" onclick="toggleRecording()">
                ⏺️ Iniciar Gravação
            </button>
            
            <div class="recording-time" id="recording-time" style="display: none;">
                <span class="recording-indicator"></span>
                <span id="time-display">00:00</span>
            </div>

            <button class="btn-stop" id="save-recording-btn" onclick="saveRecording()" style="display: none;">
                💾 Salvar Vídeo
            </button>
        </div>

        <!-- Visualização da câmera local durante transmissão -->
        <div id="local-preview-container" style="display: none;">
            <strong>Sua Câmera (Transmitindo):</strong>
            <video id="local-video" class="local-video-preview" autoplay muted playsinline></video>
        </div>

        <!-- Visualização da câmera remota -->
        <div id="video-container">
            <video id="remote-video" autoplay playsinline controls></video>
        </div>

        <div class="status" id="status">Iniciando sistema...</div>
        
        <div id="logs">
            <div class="log-entry">Sistema carregado.</div>
        </div>
    </div>

    <!-- PeerJS Library -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    
    <script>
        const myIdDisplay = document.getElementById('my-id');
        const remoteIdInput = document.getElementById('remote-id');
        const statusDisplay = document.getElementById('status');
        const logContainer = document.getElementById('logs');
        const remoteVideo = document.getElementById('remote-video');
        const videoContainer = document.getElementById('video-container');
        const recordingSection = document.getElementById('recording-section');
        const recordBtn = document.getElementById('record-btn');
        const recordingTime = document.getElementById('recording-time');
        const timeDisplay = document.getElementById('time-display');
        const saveRecordingBtn = document.getElementById('save-recording-btn');
        const localVideoPreview = document.getElementById('local-video');
        const localPreviewContainer = document.getElementById('local-preview-container');
        const stopBtn = document.getElementById('stop-btn');

        let peer = null;
        let currentCall = null;
        let localStream = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;
        let recordingStartTime = 0;
        let recordingInterval = null;
        let isTransmitting = false;

        function addLog(msg) {
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logContainer.prepend(div);
        }

        // Inicializa PeerJS
        const peer_instance = new Peer();

        peer_instance.on('open', (id) => {
            myIdDisplay.textContent = id;
            statusDisplay.textContent = 'Conectado e Pronto';
            statusDisplay.className = 'status status-online';
            addLog('ID gerado com sucesso.');
            peer = peer_instance;
        });

        peer_instance.on('error', (err) => {
            console.error('PeerJS Error:', err);
            statusDisplay.textContent = 'Erro de Conexão: ' + err.type;
            statusDisplay.className = 'status status-offline';
            addLog('ERRO: ' + err.type);
            
            if(err.type === 'browser-incompatible') {
                alert('Seu navegador não suporta WebRTC (necessário para espelhamento).');
            }
        });

        // Recebendo Chamada (Stream de vídeo vindo de outro dispositivo)
        peer_instance.on('call', (call) => {
            addLog('Recebendo sinal de vídeo...');
            
            call.answer(); 
            
            call.on('stream', (remoteStream) => {
                addLog('Stream recebido! Iniciando exibição.');
                videoContainer.style.display = 'block';
                remoteVideo.srcObject = remoteStream;
                
                remoteVideo.play().catch(e => {
                    addLog('Aguardando interação para áudio/vídeo.');
                    console.log("Autoplay blocked");
                });
                
                statusDisplay.textContent = 'Visualizando Transmissão';
                statusDisplay.className = 'status status-online';
            });

            call.on('close', () => {
                addLog('Conexão encerrada pelo transmissor.');
                videoContainer.style.display = 'none';
                statusDisplay.textContent = 'Conexão Finalizada';
                statusDisplay.className = 'status status-offline';
            });

            currentCall = call;
        });

        async function startSharing(type) {
            const targetId = remoteIdInput.value.trim();
            if (!targetId) {
                alert('Por favor, insira o ID do dispositivo que vai assistir.');
                return;
            }

            if (targetId === peer.id) {
                alert('Você não pode conectar ao seu próprio ID.');
                return;
            }

            try {
                let stream;
                if (type === 'screen') {
                    addLog('Solicitando permissão de tela...');
                    stream = await navigator.mediaDevices.getDisplayMedia({ 
                        video: { cursor: "always" }, 
                        audio: true 
                    });
                    recordingSection.style.display = 'none';
                } else {
                    addLog('Solicitando permissão de câmera...');
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'user' }, 
                        audio: true 
                    });
                    // Mostra a seção de gravação para câmera
                    recordingSection.style.display = 'block';
                    // Mostra preview da câmera local
                    localPreviewContainer.style.display = 'block';
                    localVideoPreview.srcObject = stream;
                }

                localStream = stream;
                addLog('Conectando ao ID de destino...');
                const call = peer.call(targetId, stream);
                
                statusDisplay.textContent = 'Transmitindo...';
                statusDisplay.className = 'status status-transmitting';
                isTransmitting = true;
                stopBtn.style.display = 'block';
                addLog('Transmissão iniciada com sucesso.');

                // Limpeza quando o usuário para de compartilhar pelo navegador
                stream.getVideoTracks()[0].onended = () => {
                    addLog('Compartilhamento parado pelo usuário.');
                    stopSharing();
                };

                currentCall = call;

            } catch (err) {
                console.error('Capture Error:', err);
                addLog('FALHA: ' + err.message);
                
                if (err.name === 'NotAllowedError') {
                    alert('Permissão negada. Você precisa aceitar o compartilhamento.');
                } else {
                    alert('Erro ao iniciar: ' + err.message);
                }
            }
        }

        function stopSharing() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }

            if (currentCall) {
                currentCall.close();
                currentCall = null;
            }

            isTransmitting = false;
            recordingSection.style.display = 'none';
            localPreviewContainer.style.display = 'none';
            stopBtn.style.display = 'none';
            recordBtn.textContent = '⏺️ Iniciar Gravação';
            recordBtn.className = 'btn-record';
            recordingTime.style.display = 'none';
            saveRecordingBtn.style.display = 'none';

            if (isRecording) {
                stopRecording();
            }

            statusDisplay.textContent = 'Transmissão Parada';
            statusDisplay.className = 'status status-offline';
            addLog('Transmissão encerrada.');
        }

        function toggleRecording() {
            if (!isRecording) {
                startRecording();
            } else {
                stopRecording();
            }
        }

        function startRecording() {
            if (!localStream) {
                alert('Nenhum stream ativo para gravar.');
                return;
            }

            recordedChunks = [];
            const options = { mimeType: 'video/webm;codecs=vp9' };
            
            try {
                mediaRecorder = new MediaRecorder(localStream, options);
            } catch (e) {
                // Fallback para codec padrão
                mediaRecorder = new MediaRecorder(localStream);
            }

            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    recordedChunks.push(event.data);
                }
            };

            mediaRecorder.start();
            isRecording = true;
            recordingStartTime = Date.now();
            recordBtn.textContent = '⏹️ Parar Gravação';
            recordBtn.className = 'btn-record recording';
            recordingTime.style.display = 'block';
            saveRecordingBtn.style.display = 'block';

            addLog('Gravação iniciada.');

            // Atualiza o tempo de gravação
            recordingInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                timeDisplay.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }, 100);
        }

        function stopRecording() {
            if (!mediaRecorder || !isRecording) return;

            mediaRecorder.stop();
            isRecording = false;
            recordBtn.textContent = '⏺️ Iniciar Gravação';
            recordBtn.className = 'btn-record';
            clearInterval(recordingInterval);
            addLog('Gravação parada.');
        }

        function saveRecording() {
            if (recordedChunks.length === 0) {
                alert('Nenhum vídeo foi gravado.');
                return;
            }

            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = `video_${new Date().getTime()}.webm`;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);

            recordedChunks = [];
            recordingTime.style.display = 'none';
            saveRecordingBtn.style.display = 'none';
            addLog('Vídeo salvo com sucesso.');
        }

        function copyId() {
            const idText = myIdDisplay.innerText;
            if (idText === 'Carregando...') return;
            
            navigator.clipboard.writeText(idText).then(() => {
                const originalText = myIdDisplay.textContent;
                myIdDisplay.textContent = '✅ COPIADO!';
                setTimeout(() => {
                    myIdDisplay.textContent = originalText;
                }, 1500);
            }).catch(err => {
                alert('ID: ' + idText);
            });
        }
    </script>
</body>
</html>
