<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Video Caster - Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2563eb;
            --secondary: #7c3aed;
            --background: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--background);
            color: var(--text);
            line-height: 1.6;
            transition: all 0.3s;
        }

        body.dark-mode { background: #0f172a; color: #f1f5f9; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 1rem; }

        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
            position: sticky; top: 0; z-index: 100;
        }

        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .logo {
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 1.5rem; font-weight: bold;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .section { margin: 2rem 0; }
        .section-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem; }

        .brands-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 1rem; }
        .brand-card {
            background: var(--card); border: 2px solid var(--border);
            border-radius: 1rem; padding: 1.5rem; text-align: center;
            cursor: pointer; transition: 0.3s;
        }
        .brand-card:hover { border-color: var(--primary); transform: translateY(-3px); }

        .mirroring-container { background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 2rem; }
        .screen-preview {
            width: 100%; height: 350px; background: #000;
            border-radius: 0.75rem; display: flex; align-items: center;
            justify-content: center; color: white; margin: 1.5rem 0;
            overflow: hidden;
        }

        video { width: 100%; height: 100%; object-fit: contain; }

        .connection-box {
            display: flex; flex-direction: column; gap: 1rem;
            margin-bottom: 1.5rem; padding: 1rem;
            background: var(--background); border-radius: 0.5rem;
        }

        input { padding: 0.8rem; border-radius: 0.5rem; border: 1px solid var(--border); width: 100%; font-size: 1rem; }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; border: none; padding: 0.8rem 1.5rem;
            border-radius: 0.5rem; font-weight: bold; cursor: pointer;
        }

        .btn-secondary { background: #64748b; color: white; border: none; padding: 0.8rem; border-radius: 0.5rem; cursor: pointer; }
        .id-display { font-weight: bold; color: var(--primary); font-size: 1.2rem; word-break: break-all; }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">📺 Web Video Caster</div>
                <button class="btn-secondary" onclick="document.body.classList.toggle('dark-mode')">🌙</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="section">
            <h2 class="section-title">Selecione a Marca da TV</h2>
            <div class="brands-grid">
                <div class="brand-card">Samsung</div>
                <div class="brand-card">LG</div>
                <div class="brand-card">TCL</div>
                <div class="brand-card">Roku</div>
                <div class="brand-card">Sony</div>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">Espelhar Celular para Celular</h2>
            <div class="connection-box">
                <div>
                    <button class="btn-primary" onclick="initPeer()">1. Gerar meu código de conexão</button>
                    <p style="margin-top:10px;">Seu ID: <span id="my-id" class="id-display">---</span></p>
                </div>
                <hr>
                <div>
                    <input type="text" id="remote-id" placeholder="Digite o código do outro celular">
                    <button class="btn-primary" style="margin-top:10px; width:100%;" onclick="startCellMirroring()">2. Conectar e Transmitir</button>
                </div>
            </div>
        </div>

        <div class="mirroring-container">
            <h2 id="status-text">Status: Aguardando Conexão</h2>
            <div class="screen-preview" id="preview-area">
                <div id="placeholder">🖥️ O vídeo aparecerá aqui</div>
            </div>
            <button class="btn-secondary" style="width:100%" onclick="location.reload()">⏹️ Resetar Sistema</button>
        </div>
    </main>

    <script>
        let peer;
        let localStream;

        function initPeer() {
            peer = new Peer();
            peer.on('open', (id) => {
                document.getElementById('my-id').innerText = id;
                document.getElementById('status-text').innerText = "Status: Online. Aguardando chamada...";
            });

            peer.on('call', (call) => {
                call.answer();
                call.on('stream', (remoteStream) => {
                    displayStream(remoteStream);
                });
            });
        }

        async function startCellMirroring() {
            const remoteId = document.getElementById('remote-id').value;
            if (!remoteId) return alert("Por favor, insira o ID do outro celular.");

            try {
                // Solução para Mobile: Usar a câmera em vez da tela para evitar o erro de permissão
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                
                displayStream(localStream);
                
                if(!peer) peer = new Peer();
                peer.call(remoteId, localStream);
                
                document.getElementById('status-text').innerText = "Status: Transmitindo Câmera...";
            } catch (err) {
                console.error(err);
                alert("Erro ao acessar câmera: " + err.message);
            }
        }

        function displayStream(stream) {
            const area = document.getElementById('preview-area');
            area.innerHTML = '';
            const video = document.createElement('video');
            video.srcObject = stream;
            video.autoplay = true;
            video.playsInline = true; 
            area.appendChild(video);
        }
    </script>
</body>
    </html>
